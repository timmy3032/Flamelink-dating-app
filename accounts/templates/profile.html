<!doctype html>
<html>
<head><title>{{ profile_user.username }}</title></head>
<body>
  <a href="{% url 'discover' %}">Back</a>
  <h2>{{ profile_user.username }}</h2>
  {% if profile_user.profile_picture %}
    <img src="{{ profile_user.profile_picture.url }}" width="250">
  {% endif %}
  <p>Age: {{ profile_user.age }}</p>
  <p>Gender: {{ profile_user.get_gender_display }}</p>
  <p>Bio: {{ profile_user.bio }}</p>
  {% if request.user.id != profile_user.id %}
    <form method="post" action="{% url 'like_user' %}">
      {% csrf_token %}
      <input type="hidden" name="receiver_id" value="{{ profile_user.id }}">
      <button type="submit">Like</button>
    </form>
  {% endif %}
</body>
</html>
