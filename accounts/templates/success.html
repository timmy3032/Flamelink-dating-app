<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e6ffe6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            text-align: center;
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
        }

        h2 {
            color: green;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background: #007bff;
            padding: 10px 20px;
            color: white;
            border-radius: 6px;
        }

        a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Signup Successful 🎉</h2>
    <p>Your account has been created successfully.</p>

    <a href="/signup/">Create Another Account</a>
</div>

</body>
</html>
