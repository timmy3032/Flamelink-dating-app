<!DOCTYPE html>
<html>
<head>
    <title>Flamelink Dating App</title>
</head>
<body>

<h1>🔥 Flamelink Dating App</h1>

<h2>All Users</h2>
<button onclick="loadUsers()">Load Users</button>
<ul id="users"></ul>

<h2>Like User</h2>
<input id="sender" placeholder="Your ID">
<input id="receiver" placeholder="User ID to like">
<button onclick="likeUser()">Like</button>

<h2>Matches</h2>
<input id="matchUserId" placeholder="Your ID">
<button onclick="getMatches()">Get Matches</button>
<ul id="matches"></ul>

<h2>Send Message</h2>
<input id="msgSender" placeholder="Sender ID">
<input id="msgReceiver" placeholder="Receiver ID">
<input id="message" placeholder="Message">
<button onclick="sendMessage()">Send</button>

<script>
const BASE_URL = "https://flamelink-dating-app.onrender.com/api";

async function loadUsers() {
    let res = await fetch(`${BASE_URL}/dashboard/`);
    let data = await res.json();

    let list = document.getElementById("users");
    list.innerHTML = "";

    data.forEach(user => {
        let li = document.createElement("li");
        li.innerText = `ID: ${user.id} - ${user.username}`;
        list.appendChild(li);
    });
}

async function likeUser() {
    let sender = document.getElementById("sender").value;
    let receiver = document.getElementById("receiver").value;

    let res = await fetch(`${BASE_URL}/like/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sender_id: sender, receiver_id: receiver })
    });

    let data = await res.json();
    alert(JSON.stringify(data));
}

async function getMatches() {
    let userId = document.getElementById("matchUserId").value;

    let res = await fetch(`${BASE_URL}/matches/${userId}/`);
    let data = await res.json();

    let list = document.getElementById("matches");
    list.innerHTML = "";

    data.forEach(match => {
        let li = document.createElement("li");
        li.innerText = `Match: ${match.user1} ❤️ ${match.user2}`;
        list.appendChild(li);
    });
}

async function sendMessage() {
    let sender = document.getElementById("msgSender").value;
    let receiver = document.getElementById("msgReceiver").value;
    let message = document.getElementById("message").value;

    let res = await fetch("https://flamelink-dating-app.onrender.com/api/chat/send/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            sender_id: sender,
            receiver_id: receiver,
            message: message
        })
    });

    let data = await res.json();
    alert(JSON.stringify(data));
}
</script>

</body>
</html>
